# cloudbuild.yaml

steps:
  # 1) Build image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/learning-496718/javascript-tetris/javascript-tetris-2:$COMMIT_SHA'
      - '.'

  # 2) Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/learning-496718/javascript-tetris/javascript-tetris-2:$COMMIT_SHA'

  # 3) Deploy image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'javascript-tetris-2'         # Cloud Run service name
      - '--image'
      - 'us-central1-docker.pkg.dev/learning-496718/javascript-tetris/javascript-tetris-2:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      # optional, but good to specify:
      # - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/learning-496718/javascript-tetris/javascript-tetris-2:$COMMIT_SHA'
